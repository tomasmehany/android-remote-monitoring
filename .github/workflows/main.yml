name: Build APK

on:
  workflow_dispatch:
    inputs:
      server_ip:
        description: 'Server IP Address'
        required: true
        default: '192.168.0.173'
      server_port:
        description: 'Server Port'
        required: true
        default: '8080'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Download Android 30 platform
        run: |
          sdkmanager "platforms;android-30"
          sdkmanager "build-tools;30.0.3"

      - name: Create simple APK
        run: |
          # إنشاء ملف نصي بسيط
          echo "This is a test APK file" > app.apk
          echo "Server IP: ${{ github.event.inputs.server_ip }}" >> app.apk
          echo "Server Port: ${{ github.event.inputs.server_port }}" >> app.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: my-app
          path: app.apk
