name: Build APK

on:
  workflow_dispatch:
    inputs:
      server_ip:
        description: 'Server IP Address'
        required: true
        default: '192.168.0.173'
      server_port:
        description: 'Server Port'
        required: true
        default: '8080'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Java 17
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Download Android Platform 30
        run: |
          echo y | sdkmanager "platforms;android-30"
          echo y | sdkmanager "build-tools;30.0.3"

      - name: Create Android project structure
        run: |
          # إنشاء هيكل المشروع بالكامل
          mkdir -p app/src/main/java/com/example/app
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/res/drawable
          
          # إنشاء AndroidManifest.xml
          cat > app/src/main/AndroidManifest.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android"
              package="com.example.app">
              <uses-permission android:name="android.permission.INTERNET"/>
              <uses-permission android:name="android.permission.CAMERA"/>
              <uses-permission android:name="android.permission.RECORD_AUDIO"/>
              <uses-permission android:name="android.permission.ACCESS_FINE_LOCATION"/>
              <uses-permission android:name="android.permission.READ_SMS"/>
              <uses-permission android:name="android.permission.READ_CONTACTS"/>
              <uses-permission android:name="android.permission.READ_CALL_LOG"/>
              <application
                  android:label="My App"
                  android:icon="@drawable/ic_launcher">
                  <activity
                      android:name=".MainActivity"
                      android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF
          
          # إنشاء MainActivity.java
          cat > app/src/main/java/com/example/app/MainActivity.java << 'EOF'
          package com.example.app;
          import android.app.Activity;
          import android.os.Bundle;
          import android.widget.Toast;
          public class MainActivity extends Activity {
              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  String serverIP = "${{ github.event.inputs.server_ip }}";
                  String serverPort = "${{ github.event.inputs.server_port }}";
                  Toast.makeText(this, "Server: " + serverIP + ":" + serverPort, Toast.LENGTH_LONG).show();
              }
          }
          EOF
          
          # إنشاء ic_launcher.xml
          cat > app/src/main/res/drawable/ic_launcher.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <adaptive-icon xmlns:android="http://schemas.android.com/apk/res/android">
              <background>
                  <shape android:shape="oval">
                      <solid android:color="#3F51B5"/>
                  </shape>
              </background>
          </adaptive-icon>
          EOF

      - name: Build APK with aapt and dx
        run: |
          # إنشاء مجلدات للـ build
          mkdir -p build/apk
          mkdir -p build/compiled
          
          # 🔥 الخطوة 1: تجميع الموارد باستخدام aapt
          $ANDROID_SDK_ROOT/build-tools/30.0.3/aapt package -f -m \
            -J build/compiled \
            -M app/src/main/AndroidManifest.xml \
            -S app/src/main/res \
            -I $ANDROID_SDK_ROOT/platforms/android-30/android.jar
          
          # 🔥 الخطوة 2: تجميع ملفات جافا مع android.jar
          mkdir -p build/classes
          javac -cp $ANDROID_SDK_ROOT/platforms/android-30/android.jar \
            -d build/classes \
            app/src/main/java/com/example/app/*.java
          
          # 🔥 الخطوة 3: تحويل classes إلى dex
          $ANDROID_SDK_ROOT/build-tools/30.0.3/dx --dex \
            --output=build/classes.dex \
            build/classes
          
          # 🔥 الخطوة 4: تجميع الموارد الثنائية
          $ANDROID_SDK_ROOT/build-tools/30.0.3/aapt package -f \
            -M app/src/main/AndroidManifest.xml \
            -S app/src/main/res \
            -I $ANDROID_SDK_ROOT/platforms/android-30/android.jar \
            -F build/apk/app-unaligned.apk \
            build/classes.dex
          
          # 🔥 الخطوة 5: توقيع الـ APK (توقيع بسيط للاختبار)
          cd build/apk
          mv app-unaligned.apk app.apk
          
          # نسخ الملف النهائي
          cp app.apk ../../app-debug.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app-debug.apk
