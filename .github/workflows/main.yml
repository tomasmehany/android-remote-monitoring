name: Build APK

on:
  workflow_dispatch:
    inputs:
      server_ip:
        description: 'Server IP Address'
        required: true
        default: '192.168.0.173'
      server_port:
        description: 'Server Port'
        required: true
        default: '8080'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up JDK
        uses: actions/setup-java@v3
        with:
          java-version: '11'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Create project files
        run: |
          # إنشاء ملفات المشروع الأساسية (Gradle)
          cat > settings.gradle << 'EOF'
          rootProject.name = 'MyApp'
          include ':app'
          EOF
          
          mkdir -p app
          cat > app/build.gradle << 'EOF'
          apply plugin: 'com.android.application'
          
          android {
              compileSdkVersion 30
              buildToolsVersion "30.0.3"
              
              defaultConfig {
                  applicationId "com.example.myapp"
                  minSdkVersion 21
                  targetSdkVersion 30
                  versionCode 1
                  versionName "1.0"
              }
          }
          
          dependencies {
              implementation 'com.android.support:appcompat-v7:28.0.0'
          }
          EOF
          
          mkdir -p app/src/main/java/com/example/myapp
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/res/layout
          
          # AndroidManifest.xml
          cat > app/src/main/AndroidManifest.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest package="com.example.myapp">
              <uses-permission android:name="android.permission.INTERNET"/>
              <uses-permission android:name="android.permission.CAMERA"/>
              <uses-permission android:name="android.permission.RECORD_AUDIO"/>
              <uses-permission android:name="android.permission.ACCESS_FINE_LOCATION"/>
              <uses-permission android:name="android.permission.READ_SMS"/>
              <uses-permission android:name="android.permission.READ_CONTACTS"/>
              <uses-permission android:name="android.permission.READ_CALL_LOG"/>
              <application android:label="MyApp">
                  <activity android:name=".MainActivity">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN"/>
                          <category android:name="android.intent.category.LAUNCHER"/>
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF
          
          # MainActivity.java مع تضمين IP
          cat > app/src/main/java/com/example/myapp/MainActivity.java << 'EOF'
          package com.example.myapp;
          import android.app.Activity;
          import android.os.Bundle;
          import android.widget.Toast;
          public class MainActivity extends Activity {
              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  String serverIP = "${{ github.event.inputs.server_ip }}";
                  String serverPort = "${{ github.event.inputs.server_port }}";
                  Toast.makeText(this, serverIP + ":" + serverPort, Toast.LENGTH_LONG).show();
              }
          }
          EOF
          
          # build.gradle root
          cat > build.gradle << 'EOF'
          buildscript {
              repositories {
                  google()
                  jcenter()
              }
              dependencies {
                  classpath 'com.android.tools.build:gradle:4.2.2'
              }
          }
          
          allprojects {
              repositories {
                  google()
                  jcenter()
              }
          }
          EOF
          
          # Gradle wrapper
          mkdir -p gradle/wrapper
          cat > gradle/wrapper/gradle-wrapper.properties << 'EOF'
          distributionBase=GRADLE_USER_HOME
          distributionPath=wrapper/dists
          distributionUrl=https\://services.gradle.org/distributions/gradle-6.7.1-bin.zip
          zipStoreBase=GRADLE_USER_HOME
          zipStorePath=wrapper/dists
          EOF
          
          # gradlew
          touch gradlew
          chmod +x gradlew

      - name: Build APK with Gradle
        run: ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/app-debug.apk
