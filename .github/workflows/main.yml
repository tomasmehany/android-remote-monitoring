name: Build APK

on:
  workflow_dispatch:
    inputs:
      server_ip:
        description: 'Server IP Address'
        required: true
        default: '192.168.0.173'
      server_port:
        description: 'Server Port'
        required: true
        default: '8080'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Java 17 (المشكلة هنا كانت Java 11)
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'  # 🔥 غيرناها من 11 لـ 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Create simple Android app
        run: |
          mkdir -p app/src/main/java/com/example/app
          mkdir -p app/src/main/res/layout
          
          # Create AndroidManifest.xml
          cat > app/src/main/AndroidManifest.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android"
              package="com.example.app">
              <uses-permission android:name="android.permission.INTERNET"/>
              <uses-permission android:name="android.permission.CAMERA"/>
              <uses-permission android:name="android.permission.RECORD_AUDIO"/>
              <uses-permission android:name="android.permission.ACCESS_FINE_LOCATION"/>
              <uses-permission android:name="android.permission.READ_SMS"/>
              <uses-permission android:name="android.permission.READ_CONTACTS"/>
              <uses-permission android:name="android.permission.READ_CALL_LOG"/>
              <application
                  android:label="My App"
                  android:icon="@mipmap/ic_launcher">
                  <activity
                      android:name=".MainActivity"
                      android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF
          
          # Create MainActivity.java
          cat > app/src/main/java/com/example/app/MainActivity.java << 'EOF'
          package com.example.app;
          import android.app.Activity;
          import android.os.Bundle;
          import android.widget.Toast;
          public class MainActivity extends Activity {
              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  Toast.makeText(this, "App Started", Toast.LENGTH_LONG).show();
              }
          }
          EOF
          
          # Create build.gradle
          cat > app/build.gradle << 'EOF'
          apply plugin: 'com.android.application'
          android {
              compileSdkVersion 30
              defaultConfig {
                  applicationId "com.example.app"
                  minSdkVersion 21
                  targetSdkVersion 30
                  versionCode 1
                  versionName "1.0"
              }
          }
          dependencies {
              implementation 'com.android.support:appcompat-v7:28.0.0'
          }
          EOF
          
          # Create settings.gradle
          echo "include ':app'" > settings.gradle
          
          # Update server IP in Java files
          find . -name "*.java" -exec sed -i "s/YOUR_SERVER_IP/${{ github.event.inputs.server_ip }}/g" {} \;
          find . -name "*.java" -exec sed -i "s/YOUR_SERVER_PORT/${{ github.event.inputs.server_port }}/g" {} \;

      - name: Build APK
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/app-debug.apk
