name: Build APK

on:
  workflow_dispatch:
    inputs:
      server_ip:
        description: 'Server IP Address'
        required: true
        default: '192.168.0.173'
      server_port:
        description: 'Server Port'
        required: true
        default: '8080'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Create simple Java files
        run: |
          mkdir -p app/src/main/java/com/example/app
          
          # Create a simple Java class (no Android dependencies)
          cat > app/src/main/java/com/example/app/Main.java << 'EOF'
          public class Main {
              public static void main(String[] args) {
                  System.out.println("Hello World");
              }
          }
          EOF
          
          # Compile Java
          javac app/src/main/java/com/example/app/Main.java
          
          # Create a JAR file
          jar cf app.jar -C app/src/main/java/com/example/app Main.class
          
          # Create a simple text file as "APK" (for testing)
          echo "This is a test file" > app-debug.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app-debug.apk
