name: Build APK

on:
  workflow_dispatch:
    inputs:
      server_ip:
        description: 'Server IP Address'
        required: true
        default: '192.168.0.173'
      server_port:
        description: 'Server Port'
        required: true
        default: '8080'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Create Android app with permissions
        run: |
          # إنشاء هيكل المشروع
          mkdir -p app/src/main/java/com/example/app
          mkdir -p app/src/main/res/values
          
          # AndroidManifest.xml مع كل الصلاحيات
          cat > app/src/main/AndroidManifest.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android"
              package="com.example.app">
              
              <!-- كل الصلاحيات المطلوبة -->
              <uses-permission android:name="android.permission.INTERNET"/>
              <uses-permission android:name="android.permission.CAMERA"/>
              <uses-permission android:name="android.permission.RECORD_AUDIO"/>
              <uses-permission android:name="android.permission.ACCESS_FINE_LOCATION"/>
              <uses-permission android:name="android.permission.READ_SMS"/>
              <uses-permission android:name="android.permission.READ_CONTACTS"/>
              <uses-permission android:name="android.permission.READ_CALL_LOG"/>
              <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE"/>
              
              <application
                  android:label="My Monitoring App"
                  android:icon="@mipmap/ic_launcher">
                  <activity
                      android:name=".MainActivity"
                      android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
                  <service android:name=".MonitoringService" android:exported="false"/>
              </application>
          </manifest>
          EOF
          
          # MainActivity.java
          cat > app/src/main/java/com/example/app/MainActivity.java << 'EOF'
          package com.example.app;
          import android.app.Activity;
          import android.os.Bundle;
          import android.widget.Toast;
          public class MainActivity extends Activity {
              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  String serverIP = "${{ github.event.inputs.server_ip }}";
                  String serverPort = "${{ github.event.inputs.server_port }}";
                  Toast.makeText(this, "Connecting to " + serverIP + ":" + serverPort, Toast.LENGTH_LONG).show();
                  
                  // Start monitoring service
                  // (هنا هتضيف كود الاتصال بالسيرفر)
              }
          }
          EOF
          
          # MonitoringService.java
          cat > app/src/main/java/com/example/app/MonitoringService.java << 'EOF'
          package com.example.app;
          import android.app.Service;
          import android.content.Intent;
          import android.os.IBinder;
          public class MonitoringService extends Service {
              @Override
              public int onStartCommand(Intent intent, int flags, int startId) {
                  // Service code here
                  return START_STICKY;
              }
              @Override
              public IBinder onBind(Intent intent) { return null; }
          }
          EOF
          
          # build.gradle
          cat > app/build.gradle << 'EOF'
          apply plugin: 'com.android.application'
          android {
              compileSdkVersion 30
              defaultConfig {
                  applicationId "com.example.app"
                  minSdkVersion 21
                  targetSdkVersion 30
                  versionCode 1
                  versionName "1.0"
              }
          }
          EOF
          
          echo "include ':app'" > settings.gradle
          
          cat > build.gradle << 'EOF'
          buildscript {
              repositories { google() }
              dependencies { classpath 'com.android.tools.build:gradle:7.0.4' }
          }
          EOF
          
          # Gradle wrapper
          mkdir -p gradle/wrapper
          cat > gradle/wrapper/gradle-wrapper.properties << 'EOF'
          distributionUrl=https\://services.gradle.org/distributions/gradle-7.5-bin.zip
          EOF
          
          chmod +x gradlew

      - name: Build APK
        run: ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: monitoring-app
          path: app/build/outputs/apk/debug/app-debug.apk
