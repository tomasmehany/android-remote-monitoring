name: Build APK

on:
  workflow_dispatch:
    inputs:
      server_ip:
        description: 'Server IP Address'
        required: true
        default: '192.168.0.173'
      server_port:
        description: 'Server Port'
        required: true
        default: '8080'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Java 17
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Create simple Android app
        run: |
          mkdir -p app/src/main/java/com/example/app
          mkdir -p app/src/main/res/layout
          
          # Create AndroidManifest.xml
          cat > app/src/main/AndroidManifest.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android"
              package="com.example.app">
              <uses-permission android:name="android.permission.INTERNET"/>
              <uses-permission android:name="android.permission.CAMERA"/>
              <uses-permission android:name="android.permission.RECORD_AUDIO"/>
              <uses-permission android:name="android.permission.ACCESS_FINE_LOCATION"/>
              <uses-permission android:name="android.permission.READ_SMS"/>
              <uses-permission android:name="android.permission.READ_CONTACTS"/>
              <uses-permission android:name="android.permission.READ_CALL_LOG"/>
              <application
                  android:label="My App"
                  android:icon="@mipmap/ic_launcher">
                  <activity
                      android:name=".MainActivity"
                      android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF
          
          # Create MainActivity.java
          cat > app/src/main/java/com/example/app/MainActivity.java << 'EOF'
          package com.example.app;
          import android.app.Activity;
          import android.os.Bundle;
          import android.widget.Toast;
          public class MainActivity extends Activity {
              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  String serverIP = "${{ github.event.inputs.server_ip }}";
                  String serverPort = "${{ github.event.inputs.server_port }}";
                  Toast.makeText(this, "Server: " + serverIP + ":" + serverPort, Toast.LENGTH_LONG).show();
              }
          }
          EOF

      - name: Build APK manually
        run: |
          # تجميع ملفات جافا
          mkdir -p bin
          ANDROID_JAR="$ANDROID_SDK_ROOT/platforms/android-30/android.jar"
          javac -cp "$ANDROID_JAR" -d bin app/src/main/java/com/example/app/*.java
          
          # تحويل classes إلى dex
          $ANDROID_SDK_ROOT/build-tools/30.0.3/dx --dex --output=classes.dex bin
          
          # إنشاء مجلد للـ APK
          mkdir -p build/apk
          cd build/apk
          
          # نسخ الملفات
          cp ../../app/src/main/AndroidManifest.xml .
          cp ../../classes.dex .
          
          # إنشاء ملف APK
          mkdir -p META-INF
          mkdir -p res/drawable
          
          # إنشاء أيقونة بسيطة
          echo "<?xml version=\"1.0\" encoding=\"utf-8\"?><adaptive-icon xmlns:android=\"http://schemas.android.com/apk/res/android\"><background><shape android:shape=\"oval\"><solid android:color=\"#3F51B5\"/></shape></background></adaptive-icon>" > res/drawable/ic_launcher.xml
          
          # عمل zip وتغيير الامتداد لـ apk
          zip -r app.apk AndroidManifest.xml classes.dex res META-INF
          mv app.apk ../../app-debug.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app-debug.apk
