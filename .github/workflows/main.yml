name: Build APK

on:
  workflow_dispatch:
    inputs:
      server_ip:
        description: 'Server IP Address'
        required: true
        default: '192.168.0.173'
      server_port:
        description: 'Server Port'
        required: true
        default: '8080'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Download Android components
        run: |
          sdkmanager "platforms;android-30" "build-tools;30.0.3" "platform-tools"

      - name: Create Android project structure
        run: |
          # هيكل المشروع
          mkdir -p app/src/main/java/com/example/app
          
          # AndroidManifest.xml
          cat > app/src/main/AndroidManifest.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android"
              package="com.example.app">
              <uses-permission android:name="android.permission.INTERNET"/>
              <uses-permission android:name="android.permission.CAMERA"/>
              <uses-permission android:name="android.permission.RECORD_AUDIO"/>
              <uses-permission android:name="android.permission.ACCESS_FINE_LOCATION"/>
              <uses-permission android:name="android.permission.READ_SMS"/>
              <uses-permission android:name="android.permission.READ_CONTACTS"/>
              <uses-permission android:name="android.permission.READ_CALL_LOG"/>
              <application android:label="MyApp">
                  <activity android:name=".MainActivity">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN"/>
                          <category android:name="android.intent.category.LAUNCHER"/>
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF
          
          # MainActivity.java
          cat > app/src/main/java/com/example/app/MainActivity.java << 'EOF'
          package com.example.app;
          import android.app.Activity;
          import android.os.Bundle;
          import android.widget.Toast;
          public class MainActivity extends Activity {
              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  Toast.makeText(this, "Server: ${{ github.event.inputs.server_ip }}:${{ github.event.inputs.server_port }}", Toast.LENGTH_LONG).show();
              }
          }
          EOF
          
          # build.gradle للتطبيق
          cat > app/build.gradle << 'EOF'
          apply plugin: 'com.android.application'
          android {
              compileSdkVersion 30
              defaultConfig {
                  applicationId "com.example.app"
                  minSdkVersion 21
                  targetSdkVersion 30
              }
          }
          EOF
          
          # settings.gradle
          echo "include ':app'" > settings.gradle
          
          # build.gradle الرئيسي
          cat > build.gradle << 'EOF'
          buildscript {
              repositories {
                  google()
                  jcenter()
              }
              dependencies {
                  classpath 'com.android.tools.build:gradle:4.2.2'
              }
          }
          
          allprojects {
              repositories {
                  google()
                  jcenter()
              }
          }
          EOF
          
          # Gradle Wrapper
          mkdir -p gradle/wrapper
          cat > gradle/wrapper/gradle-wrapper.properties << 'EOF'
          distributionBase=GRADLE_USER_HOME
          distributionPath=wrapper/dists
          distributionUrl=https\://services.gradle.org/distributions/gradle-6.7.1-bin.zip
          zipStoreBase=GRADLE_USER_HOME
          zipStorePath=wrapper/dists
          EOF
          
          touch gradlew
          chmod +x gradlew

      - name: Build APK with Gradle
        run: ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: **/*.apk
